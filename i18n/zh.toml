[docs.troubleshooting]
title = "故障排除"

[docs.troubleshooting.hotkey]
title = "热键无反应"
item1 = "检查托盘图标是否为绿色（活动状态）。如果是红色，右键 → 重启服务器。"
item2 = "另一个应用可能正在占用 `Ctrl`+`Space`。在设置中更改热键。"

[docs.troubleshooting.mic]
title = "检测不到麦克风输入"
item1 = "打开 Windows 设置 → 隐私 → 麦克风，允许桌面应用访问麦克风。"
item2 = "右键托盘图标 → 设置 → 音频设备，选择正确的麦克风。"

[docs.troubleshooting.slow]
title = "识别速度慢"
item1 = "启动后首次识别较慢，因为模型正在加载到内存。后续识别即时响应。"
item2 = "如果不需要方言支持，切换到 SenseVoice-Small（更快）。"
item3 = "如果只需要转录，关闭翻译功能。"

[docs.troubleshooting.download]
title = "模型下载失败"
item1 = "检查网络连接。模型下载需要一次性连接到 Hugging Face 或 ModelScope。"
item2 = "如果 Hugging Face 速度慢，在设置 → 模型 → 镜像中切换到 ModelScope 镜像。"

[docs.troubleshooting.t1]
title = "翻译/润色没反应？"
item1 = "偏好设置 → Ollama 开关是否开启且 Ollama 是否在运行？（开启且不在线 = 一直等连接）"
item2 = "Local LLM 是否已下载？"
item3 = "是否被 Windows 受控文件夹访问拦截？（见上方\"安装\"章节）"

[docs.troubleshooting.t2]
title = "下载速度慢？"
item1 = "SenseVoice 从 HuggingFace / ModelScope 下载，国内通常走 ModelScope，速度应正常。"
item2 = "Qwen3-ASR 从 GitHub Releases 下载，国内可能慢。软件会自动测速选最快的镜像。"

[docs.troubleshooting.t3]
title = "启动后没反应？"
item1 = "等 5 秒 —— 服务端需要启动时间"
item2 = "打开任务管理器看 `speech-server.exe` 是否在运行"
item3 = "如果上一步已安装过旧版，手动杀进程再启动：`taskkill /F /IM speech-server.exe`"

[docs.troubleshooting.t4]
title = "如何卸载？"
item1 = "开始菜单 → 设置 → 应用 → 已安装的应用 → 搜索 OFFTYPE → 卸载。"
item2 = "模型文件在 `%APPDATA%\\OFFTYPE\\models\\`，卸载后需手动删除。"

[docs.faq]
title = "常见问题"
q1 = "OFFTYPE 会把我的声音发送到别处吗？"
a1 = "不会。语音识别、标点和翻译全部在你的机器上完成。请参阅[隐私保护](/privacy/)页面查看 Wireshark 证明。"
q2 = "OFFTYPE 能离线使用吗？"
a2 = "可以，在首次下载模型后即可完全离线使用。"
q3 = "能在 macOS 或 Linux 上使用吗？"
a3 = "目前不能。OFFTYPE 仅支持 Windows。macOS 和 Linux 不在近期路线图中。"
q4 = "有付费版吗？"
a4 = "OFFTYPE 目前完全免费，没有订阅，没有账户，没有支付。"
q5 = "能在企业网络环境中使用吗？"
a5 = "可以。OFFTYPE 仅在初始模型下载和可选更新检查时需要网络。之后完全离线工作。如果你的防火墙屏蔽了 Hugging Face，配置 ModelScope 镜像即可。"
q6 = "如何卸载？"
a6 = "Windows 设置 → 应用 → OFFTYPE → 卸载。要彻底删除所有数据，手动删除 `%APPDATA%\\OFFTYPE\\`。"

