# 10. PRIVACY POLICY page (legal)
[privacy_policy]
[privacy_policy.hero]
eyebrow = "法律 · 隐私政策"
title = "隐私政策"
subtitle = "我们不收集任何东西。此政策详细说明这意味着什么。"
meta = "生效日期：2026-05-03 · 最后更新：2026-05-03"

[privacy_policy.section1]
title = "OFFTYPE 不做什么"
intro = "OFFTYPE **不会**收集、传输或存储："
item1 = "语音录音或麦克风输入"
item2 = "转录文本或键盘输入"
item3 = "你使用应用时的文档或窗口"
item4 = "姓名、邮箱或账户信息（没有账户）"
item5 = "IP 地址、设备标识符或系统元数据"
item6 = "崩溃报告、遥测或使用分析"
item7 = "没有账户。没有分析服务。"

[privacy_policy.section2]
title = "网络活动"
intro = "OFFTYPE 仅在以下两种情况下连接互联网："
p1 = "**1. 模型下载** —— 安装或更新 AI 模型时，文件从 [Hugging Face](https://huggingface.co/privacy) 或 [ModelScope](https://www.modelscope.cn/privacy) 下载。这些服务可能根据其各自的政策记录标准 HTTP 元数据（IP、用户代理）。我们不接收这些数据。你可以跳过可选模型；只有默认 ASR 模型在首次运行时自动下载。"
p2 = "**2. 更新检查** —— 应用可能检查 [GitHub Releases](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement) 以获取新版本。这直接向 GitHub 发送最小请求；我们不接收或记录它。你可以在设置中禁用此功能。"
p3 = "语音识别、标点、翻译和文本注入完全在你的设备上完成，不发出任何网络请求。"

[privacy_policy.section3]
title = "本地数据存储"
intro = "OFFTYPE 仅在你的设备上存储以下内容："
item1 = "**配置文件：** `%APPDATA%/OFFTYPE/config.yaml` —— 你的热键、模型选择和偏好设置。"
item2 = "**模型文件：** `%APPDATA%/OFFTYPE/models/` —— 已下载的 AI 模型。"
item3 = "**日志：** `%APPDATA%/OFFTYPE/logs/` —— 本地诊断日志（仅在此机器上，永不传输）。"
outro = "你可以随时删除以上任何内容。通过「添加或删除程序」卸载 OFFTYPE 会移除应用程序；数据文件夹可能需要手动删除才能完全清除。"

[privacy_policy.section4]
title = "Cookie 与追踪"
body = "OFFTYPE 是桌面应用，不是网站。它不使用 Cookie 或追踪器。"

[privacy_policy.section5]
title = "第三方组件"
p1 = "OFFTYPE 使用开源 AI 模型和库。它们都不会从你的设备传输数据。完整列表请见[声明](/notice/)页面。"
p2 = "使用网络功能时，你直接与 [Hugging Face](https://huggingface.co/privacy)、[ModelScope](https://www.modelscope.cn/privacy) 和 [GitHub](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement) 交互。"

[privacy_policy.section6]
title = "你的权利"
body = "因为我们不收集个人数据，通常没有数据可供访问、更正或删除。如果你在欧盟，根据 GDPR，你对第三方服务（Hugging Face、ModelScope、GitHub）在使用网络功能时可能处理的个人数据享有权利。要行使这些权利，请直接联系这些服务，或发邮件给我们，我们会为你指明方向。"

[privacy_policy.section7]
title = "本政策的变更"
body = "如果此政策发生变更，我们将更新顶部的日期并在网站上发布通知。重大变更也会出现在应用的发布说明中。"

[privacy_policy.section8]
title = "联系方式"
body = "有问题？请发送邮件至 [privacy@offtype.app](mailto:privacy@offtype.app)。"

disclaimer = "*本政策以简洁中文提供。不替代法律建议。*"

