# 7. PRIVACY page (marketing/explainer)
[privacy]
[privacy.hero]
eyebrow = "Privacy by design"
title = "Zero network requests.\nYour voice never leaves your machine."
subtitle = "Not a slogan. A verifiable fact — captured in Wireshark."

[privacy.proof]
eyebrow = "Proof, captured live"
title = "1,683 packets · 0 external connections"
body = "We ran Wireshark while using OFFTYPE for voice input. The filter `ip.addr != 127.0.0.1 && ip.addr != ::1` shows all external network traffic. The result speaks for itself."
caption = "Filter: `ip.addr != 127.0.0.1 && ip.addr != ::1` · 1,683 packets captured · 0 external connections during speech recognition"

[privacy.architecture]
title = "How your data flows"
subtitle = "Four stages. All happen in-process on your device."

[privacy.architecture.stage1]
title = "Microphone captures audio"
body = "Audio is captured by the system microphone and sent directly to the local speech server. It never passes through any network interface."

[privacy.architecture.stage2]
title = "Local ASR model converts speech to text"
body = "The ASR model (SenseVoice-Small or Qwen3-ASR) runs entirely in-process. The audio never leaves RAM."

[privacy.architecture.stage3]
title = "Local AI adds punctuation and corrects"
body = "Optionally, a local 1.5B-parameter model adds punctuation, translates, or rewrites the text — all processed locally."

[privacy.architecture.stage4]
title = "Text is injected at your cursor"
body = "The final text is injected directly into the target application via the clipboard. It is never sent anywhere else."

[privacy.cta]
title = "Privacy isn't a setting.\nIt's the architecture."
body = "There is no opt-in. There is no tracking. There is no cloud."

