[docs.install.security]
title = "Security notice: Windows Controlled Folder Access"
body = "OFFTYPE embeds [llama.cpp](https://github.com/ggerganov/llama.cpp) (MIT open source license) for on-device translation and text polishing. The Windows executable for this open source project is called `llama-cli.exe`. Because it lacks a commercial code signing certificate ($200–400/year), Windows Security may flag it as an unrecognized application."
blocked = "If you see \"Controlled folder access blocked llama-cli.exe\":"
step1 = "Open Windows Security → Virus & threat protection"
step2 = 'Under "Controlled folder access", click "Manage Controlled folder access"'
step3 = 'Click "Allow an app through Controlled folder access" → Add an allowed app'
step4 = "Browse to `C:\\Program Files\\OFFTYPE\\speech-server\\_internal\\llama-cpp\\llama-cli.exe`"
step5 = "Confirm"
skip = "What happens if I skip this?"
skip_body = "Translation and polish won't work. Voice input (ASR) is unaffected. It's your choice."
why = "Why isn't this done automatically?"
why_body = "Modifying system security settings is a significant change to your computer. OFFTYPE won't make that decision for you."

