[docs.troubleshooting]
title = "Troubleshooting"

[docs.troubleshooting.hotkey]
title = "The hotkey does nothing"
item1 = "Check the tray icon is green (active). Right-click → Restart Server if it's red."
item2 = "Another application may be capturing `Ctrl`+`Space`. Change the hotkey in Settings."

[docs.troubleshooting.mic]
title = "No microphone input detected"
item1 = "Open Windows Settings → Privacy → Microphone, allow desktop apps to access the microphone."
item2 = "Right-click tray icon → Settings → Audio Device, select the correct microphone."

[docs.troubleshooting.slow]
title = "Recognition is slow"
item1 = "First run after launch is slower while the model loads into RAM. Subsequent recognitions are instant."
item2 = "Switch to SenseVoice-Small (faster) if you don't need dialect support."
item3 = "Disable translation if you only need transcription."

[docs.troubleshooting.download]
title = "Model download fails"
item1 = "Check your internet connection. Model downloads need a one-time connection to Hugging Face or ModelScope."
item2 = "If Hugging Face is slow, switch to ModelScope mirror in Settings → Models → Mirror."

[docs.troubleshooting.t1]
title = "Translation / polish not working?"
item1 = "Is Ollama enabled in Preferences but Ollama isn't running? (OFFTYPE will wait for the connection and time out)"
item2 = "Is the Local LLM downloaded?"
item3 = "Is Windows Controlled Folder Access blocking `llama-cli.exe`? (See Installation section above)"

[docs.troubleshooting.t2]
title = "Download is slow?"
item1 = "SenseVoice downloads from HuggingFace / ModelScope. In most regions, ModelScope picks up automatically."
item2 = "Qwen3-ASR downloads from GitHub Releases. OFFTYPE probes available mirrors and uses the fastest one."

[docs.troubleshooting.t3]
title = "Nothing happens after launch?"
item1 = "Wait 5 seconds — the server needs time to start"
item2 = "Open Task Manager to check if `speech-server.exe` is running"
item3 = "If a previous version was installed, kill old processes first: `taskkill /F /IM speech-server.exe`"

[docs.troubleshooting.t4]
title = "How do I uninstall?"
item1 = "Start Menu → Settings → Apps → Installed apps → Search OFFTYPE → Uninstall."
item2 = "Model files are stored in `%APPDATA%\\OFFTYPE\\models\\`. You'll need to delete this folder manually after uninstalling."

[docs.faq]
title = "FAQ"
q1 = "Does OFFTYPE send my voice anywhere?"
a1 = "No. Voice recognition, punctuation, and translation all happen on your machine. See [Privacy](/privacy/) for the Wireshark proof."
q2 = "Does OFFTYPE work offline?"
a2 = "Yes, after the first model download. Subsequent use is fully offline."
q3 = "Can I use it on macOS or Linux?"
a3 = "Not currently. OFFTYPE is Windows-only. macOS and Linux are not on the immediate roadmap."
q4 = "Is there a paid version?"
a4 = "OFFTYPE is currently free. There is no subscription, no account, no payment."
q5 = "Can I run it on a corporate network?"
a5 = "Yes. OFFTYPE only needs network access for the initial model download and optional update checks. After that, it works fully offline. If your firewall blocks Hugging Face, configure the ModelScope mirror."
q6 = "How do I uninstall?"
a6 = "Windows Settings → Apps → OFFTYPE → Uninstall. To remove all data, delete `%APPDATA%\\OFFTYPE\\` manually."

