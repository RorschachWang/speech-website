# 10. PRIVACY POLICY page (legal)
[privacy_policy]
[privacy_policy.hero]
eyebrow = "법적 고지 · 개인정보 처리방침"
title = "Privacy Policy"
subtitle = "우리는 아무것도 수집하지 않습니다. 이 정책은 그것이 구체적으로 무엇을 의미하는지 설명합니다."
meta = "발효일: 2026-05-03 · 최종 수정일: 2026-05-03"

[privacy_policy.section1]
title = "What OFFTYPE Does Not Do"
intro = "OFFTYPE does **not** collect, transmit, or store:"
item1 = "Voice recordings or microphone input"
item2 = "Transcribed text or keystrokes"
item3 = "Documents or windows you use with the app"
item4 = "Names, emails, or account info (there are no accounts)"
item5 = "IP addresses, device identifiers, or system metadata"
item6 = "Crash reports, telemetry, or usage analytics"
item7 = "There is no account. There is no analytics service."

[privacy_policy.section2]
title = "Network Activity"
intro = "OFFTYPE only connects to the internet in two situations:"
p1 = "**1. Model downloads** — When you install or update an AI model, files are downloaded from [Hugging Face](https://huggingface.co/privacy) or [ModelScope](https://www.modelscope.cn/privacy). These services may log standard HTTP metadata (IP, user agent) per their own policies. We do not receive this data. You can skip optional models; only the default ASR model downloads automatically on first run."
p2 = "**2. Update checks** — The app may check [GitHub Releases](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement) for new versions. This sends a minimal request directly to GitHub; we do not receive or log it. You can disable this in Settings."
p3 = "Voice recognition, punctuation, translation, and text injection happen entirely on your device with no network requests."

[privacy_policy.section3]
title = "Local Data Storage"
intro = "OFFTYPE stores the following on your device only:"
item1 = "**Configuration:** `%APPDATA%/OFFTYPE/config.yaml` — your hotkey, model selection, and preferences."
item2 = "**Model files:** `%APPDATA%/OFFTYPE/models/` — downloaded AI models."
item3 = "**Logs:** `%APPDATA%/OFFTYPE/logs/` — local diagnostic logs (only on this machine, never transmitted)."
outro = "You can delete any of these at any time. Uninstalling OFFTYPE through Add or Remove Programs removes the application; the data folder may need to be deleted manually if you want to remove it completely."

[privacy_policy.section4]
title = "Cookies and Tracking"
body = "OFFTYPE is a desktop app, not a website. It does not use cookies or trackers."

[privacy_policy.section5]
title = "Third-Party Components"
p1 = "OFFTYPE uses open-source AI models and libraries. None of them transmit data from your device. See the [Notice](/notice/) page for the full list."
p2 = "When you use network features, you interact directly with [Hugging Face](https://huggingface.co/privacy), [ModelScope](https://www.modelscope.cn/privacy), and [GitHub](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement)."

[privacy_policy.section6]
title = "Your Rights"
body = "Because we do not collect personal data, there is generally no data to access, correct, or delete. If you are in the EU, you have rights under the GDPR regarding any personal data that third-party services (Hugging Face, ModelScope, GitHub) may process when you use network features. To exercise those rights, contact those services directly or email us and we will point you in the right direction."

[privacy_policy.section7]
title = "Changes to This Policy"
body = "If this policy changes, we will update the date at the top and post a note on the website. Significant changes will also appear in the app's release notes."

[privacy_policy.section8]
title = "Contact"
body = "Questions? Email [privacy@offtype.app](mailto:privacy@offtype.app)."

disclaimer = "*This policy is provided in plain English. It does not replace legal advice.*"

