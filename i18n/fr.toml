[docs.quickstart]
title = "Démarrage rapide"

[docs.quickstart.step1]
title = "Téléchargez l'installateur."
body = "Allez sur la [page de téléchargement](/download/) et téléchargez l'installateur Windows (~200 Mo)."

[docs.quickstart.step2]
title = "Exécutez l'installateur."
body = "Double-cliquez sur le `.exe`. Si Windows SmartScreen vous avertit, cliquez sur « Plus d'infos » → « Exécuter quand même ». OFFTYPE s'installe dans `C:\\Program Files\\OFFTYPE\\`."

[docs.quickstart.step3]
title = "Le premier lancement télécharge le modèle par défaut."
body = "OFFTYPE télécharge SenseVoice-Small (~230 Mo) au premier lancement. C'est le seul modèle requis."

[docs.quickstart.step4]
title = "Appuyez sur Ctrl + Espace et parlez."
body = "Maintenez le raccourci clavier, parlez naturellement, relâchez. Votre texte apparaît au curseur."

