[docs.install.security]
title = "Avis de sécurité : Contrôle d'accès aux dossiers Windows"
body = "OFFTYPE intègre [llama.cpp](https://github.com/ggerganov/llama.cpp) (licence open source MIT) pour la traduction et le polissage de texte sur l'appareil. L'exécutable Windows pour ce projet open source s'appelle `llama-cli.exe`. Comme il n'a pas de certificat de signature de code commercial (200–400 $/an), la sécurité Windows peut le signaler comme une application non reconnue."
blocked = "Si vous voyez « L'accès contrôlé aux dossiers a bloqué llama-cli.exe » :"
step1 = "Ouvrez Sécurité Windows → Protection contre les virus et menaces"
step2 = "Sous « Accès contrôlé aux dossiers », cliquez sur « Gérer l'accès contrôlé aux dossiers »"
step3 = "Cliquez sur « Autoriser une application via l'accès contrôlé aux dossiers » → Ajouter une application autorisée"
step4 = "Naviguez vers `C:\\Program Files\\OFFTYPE\\speech-server\\_internal\\llama-cpp\\llama-cli.exe`"
step5 = "Confirmez"
skip = "Que se passe-t-il si je saute cette étape ?"
skip_body = "La traduction et le polissage ne fonctionneront pas. La saisie vocale (ASR) n'est pas affectée. C'est votre choix."
why = "Pourquoi cela n'est-il pas fait automatiquement ?"
why_body = "Les modifications des paramètres de sécurité du système représentent un changement important sur votre ordinateur. OFFTYPE ne prendra pas cette décision à votre place."

