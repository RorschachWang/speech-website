[docs.troubleshooting]
title = "Dépannage"

[docs.troubleshooting.hotkey]
title = "Le raccourci clavier ne fait rien"
item1 = "Vérifiez que l'icône de la barre des tâches est verte (active). Clic droit → Redémarrer le serveur si elle est rouge."
item2 = "Une autre application peut capturer `Ctrl`+`Espace`. Changez le raccourci clavier dans les paramètres."

[docs.troubleshooting.mic]
title = "Aucune entrée micro détectée"
item1 = "Ouvrez Paramètres Windows → Confidentialité → Microphone, autorisez les applications de bureau à accéder au microphone."
item2 = "Clic droit sur l'icône de la barre des tâches → Paramètres → Périphérique audio, sélectionnez le bon microphone."

[docs.troubleshooting.slow]
title = "La reconnaissance est lente"
item1 = "Le premier lancement après le démarrage est plus lent pendant que le modèle se charge en RAM. Les reconnaissances suivantes sont instantanées."
item2 = "Passez à SenseVoice-Small (plus rapide) si vous n'avez pas besoin de la prise en charge des dialectes."
item3 = "Désactivez la traduction si vous n'avez besoin que de la transcription."

[docs.troubleshooting.download]
title = "Le téléchargement du modèle échoue"
item1 = "Vérifiez votre connexion Internet. Les téléchargements de modèles nécessitent une connexion unique à Hugging Face ou ModelScope."
item2 = "Si Hugging Face est lent, passez au miroir ModelScope dans Paramètres → Modèles → Miroir."

[docs.troubleshooting.t1]
title = "La traduction / le polissage ne fonctionne pas ?"
item1 = "Ollama est-il activé dans les Préférences mais Ollama ne fonctionne pas ? (OFFTYPE attendra la connexion et expirera)"
item2 = "Le LLM local est-il téléchargé ?"
item3 = "Le Contrôle d'accès aux dossiers Windows bloque-t-il `llama-cli.exe` ? (Voir la section Installation ci-dessus)"

[docs.troubleshooting.t2]
title = "Le téléchargement est lent ?"
item1 = "SenseVoice télécharge depuis HuggingFace / ModelScope. Dans la plupart des régions, ModelScope est automatiquement sélectionné."
item2 = "Qwen3-ASR télécharge depuis GitHub Releases. OFFTYPE sonde les miroirs disponibles et utilise le plus rapide."

[docs.troubleshooting.t3]
title = "Rien ne se passe après le lancement ?"
item1 = "Attendez 5 secondes — le serveur a besoin de temps pour démarrer"
item2 = "Ouvrez le Gestionnaire des tâches pour vérifier si `speech-server.exe` est en cours d'exécution"
item3 = "Si une version précédente était installée, tuez d'abord les anciens processus : `taskkill /F /IM speech-server.exe`"

[docs.troubleshooting.t4]
title = "Comment désinstaller ?"
item1 = "Menu Démarrer → Paramètres → Applications → Applications installées → Recherchez OFFTYPE → Désinstaller."
item2 = "Les fichiers de modèle sont stockés dans `%APPDATA%\\OFFTYPE\\models\\`. Vous devrez supprimer ce dossier manuellement après la désinstallation."

[docs.faq]
title = "FAQ"
q1 = "OFFTYPE envoie-t-il ma voix quelque part ?"
a1 = "Non. La reconnaissance vocale, la ponctuation et la traduction se produisent toutes sur votre machine. Voir [Confidentialité](/privacy/) pour la preuve Wireshark."
q2 = "OFFTYPE fonctionne-t-il hors ligne ?"
a2 = "Oui, après le premier téléchargement du modèle. L'utilisation ultérieure est entièrement hors ligne."
q3 = "Puis-je l'utiliser sur macOS ou Linux ?"
a3 = "Pas actuellement. OFFTYPE est uniquement pour Windows. macOS et Linux ne sont pas prévus dans un avenir proche."
q4 = "Y a-t-il une version payante ?"
a4 = "OFFTYPE est actuellement gratuit. Il n'y a pas d'abonnement, pas de compte, pas de paiement."
q5 = "Puis-je l'exécuter sur un réseau d'entreprise ?"
a5 = "Oui. OFFTYPE ne nécessite qu'un accès réseau pour le téléchargement initial du modèle et les vérifications de mise à jour optionnelles. Après cela, il fonctionne entièrement hors ligne. Si votre pare-feu bloque Hugging Face, configurez le miroir ModelScope."
q6 = "Comment désinstaller ?"
a6 = "Paramètres Windows → Applications → OFFTYPE → Désinstaller. Pour supprimer toutes les données, supprimez manuellement `%APPDATA%\\OFFTYPE\\`."

