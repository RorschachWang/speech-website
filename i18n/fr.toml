# 7. PRIVACY page (marketing/explainer)
[privacy]
[privacy.hero]
eyebrow = "Confidentialité par conception"
title = "Zéro requête réseau.\nVotre voix ne quitte jamais votre machine."
subtitle = "Pas un slogan. Un fait vérifiable — capturé dans Wireshark."

[privacy.proof]
eyebrow = "Preuve, capturée en direct"
title = "1 683 paquets · 0 connexion externe"
body = "Nous avons exécuté Wireshark pendant l'utilisation d'OFFTYPE pour la saisie vocale. Le filtre `ip.addr != 127.0.0.1 && ip.addr != ::1` montre tout le trafic réseau externe. Le résultat parle de lui-même."
caption = "Filtre : `ip.addr != 127.0.0.1 && ip.addr != ::1` · 1 683 paquets capturés · 0 connexion externe pendant la reconnaissance vocale"

[privacy.architecture]
title = "Comment vos données circulent"
subtitle = "Quatre étapes. Tout se passe en interne sur votre appareil."

[privacy.architecture.stage1]
title = "Le micro capture l'audio"
body = "L'audio est capturé par le microphone du système et envoyé directement au serveur de parole local. Il ne passe jamais par une interface réseau."

[privacy.architecture.stage2]
title = "Le modèle ASR local convertit la parole en texte"
body = "Le modèle ASR (SenseVoice-Small ou Qwen3-ASR) s'exécute entièrement en interne. L'audio ne quitte jamais la RAM."

[privacy.architecture.stage3]
title = "L'IA locale ajoute la ponctuation et corrige"
body = "En option, un modèle local de 1,5 milliard de paramètres ajoute la ponctuation, traduit ou réécrit le texte — tout traité localement."

[privacy.architecture.stage4]
title = "Le texte est injecté à votre curseur"
body = "Le texte final est injecté directement dans l'application cible via le presse-papiers. Il n'est jamais envoyé ailleurs."

[privacy.cta]
title = "La confidentialité n'est pas un réglage.\nC'est l'architecture."
body = "Il n'y a pas d'opt-in. Il n'y a pas de suivi. Il n'y a pas de cloud."

