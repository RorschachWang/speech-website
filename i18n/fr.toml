# 10. PRIVACY POLICY page (legal)
[privacy_policy]
[privacy_policy.hero]
eyebrow = "Légal · Politique de confidentialité"
title = "Politique de confidentialité"
subtitle = "Nous ne collectons rien. Cette politique explique en détail ce que cela signifie."
meta = "Date d'entrée en vigueur : 2026-05-03 · Dernière mise à jour : 2026-05-03"

[privacy_policy.section1]
title = "Ce qu'OFFTYPE ne fait pas"
intro = "OFFTYPE ne **collecte, ne transmet et ne stocke pas** :"
item1 = "Enregistrements vocaux ou entrée micro"
item2 = "Texte transcrit ou frappes au clavier"
item3 = "Documents ou fenêtres que vous utilisez avec l'application"
item4 = "Noms, e-mails ou informations de compte (il n'y a pas de comptes)"
item5 = "Adresses IP, identifiants d'appareil ou métadonnées système"
item6 = "Rapports de plantage, télémétrie ou analyses d'utilisation"
item7 = "Il n'y a pas de compte. Il n'y a pas de service d'analyse."

[privacy_policy.section2]
title = "Activité réseau"
intro = "OFFTYPE ne se connecte à Internet que dans deux situations :"
p1 = "**1. Téléchargements de modèles** — Lorsque vous installez ou mettez à jour un modèle IA, des fichiers sont téléchargés depuis [Hugging Face](https://huggingface.co/privacy) ou [ModelScope](https://www.modelscope.cn/privacy). Ces services peuvent enregistrer des métadonnées HTTP standards (IP, user agent) conformément à leurs propres politiques. Nous ne recevons pas ces données. Vous pouvez ignorer les modèles optionnels ; seul le modèle ASR par défaut est téléchargé automatiquement au premier lancement."
p2 = "**2. Vérifications de mise à jour** — L'application peut vérifier [GitHub Releases](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement) pour les nouvelles versions. Cela envoie une requête minimale directe à GitHub ; nous ne la recevons ni ne l'enregistrons. Vous pouvez désactiver cela dans les paramètres."
p3 = "La reconnaissance vocale, la ponctuation, la traduction et l'injection de texte se déroulent entièrement sur votre appareil sans aucune requête réseau."

[privacy_policy.section3]
title = "Stockage local des données"
intro = "OFFTYPE stocke les éléments suivants uniquement sur votre appareil :"
item1 = "**Configuration :** `%APPDATA%/OFFTYPE/config.yaml` — votre raccourci clavier, sélection de modèle et préférences."
item2 = "**Fichiers de modèles :** `%APPDATA%/OFFTYPE/models/` — modèles IA téléchargés."
item3 = "**Journaux :** `%APPDATA%/OFFTYPE/logs/` — journaux de diagnostic locaux (uniquement sur cette machine, jamais transmis)."
outro = "Vous pouvez supprimer tout cela à tout moment. La désinstallation d'OFFTYPE via Ajouter ou supprimer des programmes supprime l'application ; le dossier de données peut nécessiter une suppression manuelle si vous souhaitez l'effacer complètement."

[privacy_policy.section4]
title = "Cookies et suivi"
body = "OFFTYPE est une application de bureau, pas un site web. Elle n'utilise pas de cookies ni de traceurs."

[privacy_policy.section5]
title = "Composants tiers"
p1 = "OFFTYPE utilise des modèles IA et des bibliothèques open source. Aucun d'entre eux ne transmet de données depuis votre appareil. Voir la page [Mentions](/notice/) pour la liste complète."
p2 = "Lorsque vous utilisez les fonctionnalités réseau, vous interagissez directement avec [Hugging Face](https://huggingface.co/privacy), [ModelScope](https://www.modelscope.cn/privacy) et [GitHub](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement)."

[privacy_policy.section6]
title = "Vos droits"
body = "Comme nous ne collectons pas de données personnelles, il n'y a généralement aucune donnée à consulter, corriger ou supprimer. Si vous êtes dans l'UE, vous avez des droits en vertu du RGPD concernant toute donnée personnelle que les services tiers (Hugging Face, ModelScope, GitHub) peuvent traiter lorsque vous utilisez les fonctionnalités réseau. Pour exercer ces droits, contactez directement ces services ou envoyez-nous un e-mail et nous vous orienterons."

[privacy_policy.section7]
title = "Modifications de cette politique"
body = "Si cette politique change, nous mettrons à jour la date en haut de la page et publierons une note sur le site web. Les modifications importantes apparaîtront également dans les notes de version de l'application."

[privacy_policy.section8]
title = "Contact"
body = "Des questions ? Envoyez un e-mail à [privacy@offtype.app](mailto:privacy@offtype.app)."

disclaimer = "*Cette politique est fournie en anglais simple. Elle ne remplace pas les conseils juridiques.*"

