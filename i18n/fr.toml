toggle = "**Appuyer pour basculer :** dans les paramètres, vous pouvez passer en mode bascule — appuyez une fois pour démarrer, appuyez à nouveau pour arrêter."
change = "**Changer le raccourci clavier :** clic droit sur l'icône de la barre des tâches → Paramètres → Raccourci clavier. Toute combinaison est prise en charge."

