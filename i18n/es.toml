[docs.quickstart]
title = "Inicio rápido"

[docs.quickstart.step1]
title = "Descarga el instalador."
body = "Ve a la [página de descarga](/download/) y descarga el instalador de Windows (~200 MB)."

[docs.quickstart.step2]
title = "Ejecuta el instalador."
body = "Haz doble clic en el `.exe`. Si Windows SmartScreen te advierte, haz clic en \"Más información\" → \"Ejecutar de todos modos\". OFFTYPE se instala en `C:\\Program Files\\OFFTYPE\\`."

[docs.quickstart.step3]
title = "El primer inicio descarga el modelo predeterminado."
body = "OFFTYPE descarga SenseVoice-Small (~230 MB) en el primer inicio. Este es el único modelo obligatorio."

[docs.quickstart.step4]
title = "Pulsa Ctrl + Space y habla."
body = "Mantén pulsado el atajo de teclado, habla naturalmente, suelta. Tu texto aparece en el cursor."

[docs.hotkey]
title = "Usar el atajo de teclado"
default = "Atajo de teclado predeterminado: `Ctrl` + `Space`"
hold = "**Mantén para hablar:** pulsa y mantén el atajo de teclado, habla, luego suelta. El texto reconocido se inserta en tu cursor."
toggle = "**Toca para alternar:** en Configuración, puedes cambiar al modo de alternancia — toca una vez para empezar, toca de nuevo para detener."
change = "**Cambiar el atajo de teclado:** haz clic derecho en el icono de la bandeja → Configuración → Atajo de teclado. Se admite cualquier combinación."

