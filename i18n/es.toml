check_body = "Observa el color del botón Pulsar para hablar:\n- **Verde pulsante (luz de respiración)**: Voz detectada, funcionando normalmente\n- **Verde sólido, sin parpadear**: El motor VAD está en ejecución pero no detecta voz. Intenta reiniciar OFFTYPE. Si la luz permanece sólida, comprueba que el modelo ASR esté descargado en Preferencias"

