# 10. PRIVACY POLICY page (legal)
[privacy_policy]
[privacy_policy.hero]
eyebrow = "Legal · Política de privacidad"
title = "Política de privacidad"
subtitle = "No recopilamos nada. Esta política explica en detalle qué significa eso."
meta = "Fecha de entrada en vigor: 2026-05-03 · Última actualización: 2026-05-03"

[privacy_policy.section1]
title = "Qué OFFTYPE no hace"
intro = "OFFTYPE **no** recopila, transmite ni almacena:"
item1 = "Grabaciones de voz o entrada de micrófono"
item2 = "Texto transcrito o pulsaciones de teclas"
item3 = "Documentos o ventanas que uses con la aplicación"
item4 = "Nombres, correos electrónicos o información de cuenta (no hay cuentas)"
item5 = "Direcciones IP, identificadores de dispositivo o metadatos del sistema"
item6 = "Informes de errores, telemetría o análisis de uso"
item7 = "No hay cuenta. No hay servicio de análisis."

[privacy_policy.section2]
title = "Actividad de red"
intro = "OFFTYPE solo se conecta a internet en dos situaciones:"
p1 = "**1. Descargas de modelos** — Cuando instalas o actualizas un modelo de IA, los archivos se descargan de [Hugging Face](https://huggingface.co/privacy) o [ModelScope](https://www.modelscope.cn/privacy). Estos servicios pueden registrar metadatos HTTP estándar (IP, agente de usuario) según sus propias políticas. Nosotros no recibimos estos datos. Puedes omitir los modelos opcionales; solo el modelo ASR predeterminado se descarga automáticamente en el primer inicio."
p2 = "**2. Comprobaciones de actualizaciones** — La aplicación puede consultar [GitHub Releases](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement) para nuevas versiones. Esto envía una solicitud mínima directamente a GitHub; nosotros no la recibimos ni la registramos. Puedes desactivar esto en Configuración."
p3 = "El reconocimiento de voz, la puntuación, la traducción y la inyección de texto ocurren completamente en tu dispositivo sin solicitudes de red."

[privacy_policy.section3]
title = "Almacenamiento local de datos"
intro = "OFFTYPE almacena lo siguiente únicamente en tu dispositivo:"
item1 = "**Configuración:** `%APPDATA%/OFFTYPE/config.yaml` — tu atajo de teclado, selección de modelo y preferencias."
item2 = "**Archivos de modelo:** `%APPDATA%/OFFTYPE/models/` — modelos de IA descargados."
item3 = "**Registros:** `%APPDATA%/OFFTYPE/logs/` — registros de diagnóstico locales (solo en esta máquina, nunca transmitidos)."
outro = "Puedes eliminar cualquiera de estos en cualquier momento. Desinstalar OFFTYPE a través de Agregar o quitar programas elimina la aplicación; la carpeta de datos puede necesitar ser eliminada manualmente si deseas removerla por completo."

[privacy_policy.section4]
title = "Cookies y rastreo"
body = "OFFTYPE es una aplicación de escritorio, no un sitio web. No utiliza cookies ni rastreadores."

[privacy_policy.section5]
title = "Componentes de terceros"
p1 = "OFFTYPE utiliza modelos de IA y bibliotecas de código abierto. Ninguno de ellos transmite datos desde tu dispositivo. Consulta la página [Aviso](/notice/) para la lista completa."
p2 = "Cuando utilizas funciones de red, interactúas directamente con [Hugging Face](https://huggingface.co/privacy), [ModelScope](https://www.modelscope.cn/privacy) y [GitHub](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement)."

[privacy_policy.section6]
title = "Tus derechos"
body = "Dado que no recopilamos datos personales, generalmente no hay datos a los que acceder, corregir o eliminar. Si estás en la UE, tienes derechos bajo el GDPR respecto a cualquier dato personal que los servicios de terceros (Hugging Face, ModelScope, GitHub) puedan procesar cuando utilizas funciones de red. Para ejercer esos derechos, contacta directamente a esos servicios o envíanos un correo electrónico y te orientaremos."

[privacy_policy.section7]
title = "Cambios a esta política"
body = "Si esta política cambia, actualizaremos la fecha en la parte superior y publicaremos una nota en el sitio web. Los cambios significativos también aparecerán en las notas de la versión de la aplicación."

[privacy_policy.section8]
title = "Contacto"
body = "¿Preguntas? Envía un correo electrónico a [privacy@offtype.app](mailto:privacy@offtype.app)."

disclaimer = "*Esta política se proporciona en inglés sencillo. No reemplaza el asesoramiento legal.*"

