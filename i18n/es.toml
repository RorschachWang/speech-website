[docs.troubleshooting]
title = "Solución de problemas"

[docs.troubleshooting.hotkey]
title = "El atajo de teclado no hace nada"
item1 = "Comprueba que el icono de la bandeja esté verde (activo). Haz clic derecho → Reiniciar servidor si está rojo."
item2 = "Otra aplicación puede estar capturando `Ctrl`+`Space`. Cambia el atajo de teclado en Configuración."

[docs.troubleshooting.mic]
title = "No se detecta entrada de micrófono"
item1 = "Abre Configuración de Windows → Privacidad → Micrófono, permite que las aplicaciones de escritorio accedan al micrófono."
item2 = "Haz clic derecho en el icono de la bandeja → Configuración → Dispositivo de audio, selecciona el micrófono correcto."

[docs.troubleshooting.slow]
title = "El reconocimiento es lento"
item1 = "La primera ejecución tras el inicio es más lenta mientras el modelo se carga en la RAM. Los reconocimientos posteriores son instantáneos."
item2 = "Cambia a SenseVoice-Small (más rápido) si no necesitas soporte de dialectos."
item3 = "Deshabilita la traducción si solo necesitas transcripción."

[docs.troubleshooting.download]
title = "La descarga del modelo falla"
item1 = "Comprueba tu conexión a internet. Las descargas de modelos necesitan una conexión única a Hugging Face o ModelScope."
item2 = "Si Hugging Face es lento, cambia al espejo ModelScope en Configuración → Modelos → Espejo."

[docs.troubleshooting.t1]
title = "¿La traducción / el pulido no funcionan?"
item1 = "¿Está Ollama habilitado en Preferencias pero Ollama no está en ejecución? (OFFTYPE esperará la conexión y se agotará el tiempo de espera)"
item2 = "¿Está el LLM local descargado?"
item3 = "¿El Acceso controlado a carpetas de Windows está bloqueando `llama-cli.exe`? (Consulta la sección de Instalación arriba)"

[docs.troubleshooting.t2]
title = "¿La descarga es lenta?"
item1 = "SenseVoice se descarga de HuggingFace / ModelScope. En la mayoría de regiones, ModelScope se selecciona automáticamente."
item2 = "Qwen3-ASR se descarga de GitHub Releases. OFFTYPE sondea los espejos disponibles y usa el más rápido."

[docs.troubleshooting.t3]
title = "¿No ocurre nada tras el inicio?"
item1 = "Espera 5 segundos — el servidor necesita tiempo para iniciarse"
item2 = "Abre el Administrador de tareas para comprobar si `speech-server.exe` está en ejecución"
item3 = "Si se instaló una versión anterior, mata los procesos antiguos primero: `taskkill /F /IM speech-server.exe`"

[docs.troubleshooting.t4]
title = "¿Cómo desinstalo?"
item1 = "Menú Inicio → Configuración → Aplicaciones → Aplicaciones instaladas → Buscar OFFTYPE → Desinstalar."
item2 = "Los archivos de modelo se almacenan en `%APPDATA%\\OFFTYPE\\models\\`. Deberás eliminar esta carpeta manualmente tras desinstalar."

[docs.faq]
title = "Preguntas frecuentes"
q1 = "¿OFFTYPE envía mi voz a algún sitio?"
a1 = "No. El reconocimiento de voz, la puntuación y la traducción ocurren todos en tu máquina. Consulta [Privacidad](/privacy/) para la prueba de Wireshark."
q2 = "¿OFFTYPE funciona sin conexión?"
a2 = "Sí, tras la primera descarga del modelo. El uso posterior es completamente sin conexión."
q3 = "¿Puedo usarlo en macOS o Linux?"
a3 = "No actualmente. OFFTYPE es solo para Windows. macOS y Linux no están en la hoja de ruta inmediata."
q4 = "¿Hay una versión de pago?"
a4 = "OFFTYPE es actualmente gratis. No hay suscripción, ni cuenta, ni pago."
q5 = "¿Puedo ejecutarlo en una red corporativa?"
a5 = "Sí. OFFTYPE solo necesita acceso a red para la descarga inicial del modelo y las comprobaciones de actualización opcionales. Después de eso, funciona completamente sin conexión. Si tu firewall bloquea Hugging Face, configura el espejo ModelScope."
q6 = "¿Cómo desinstalo?"
a6 = "Configuración de Windows → Aplicaciones → OFFTYPE → Desinstalar. Para eliminar todos los datos, borra `%APPDATA%\\OFFTYPE\\` manualmente."

