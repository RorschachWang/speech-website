title = "Aviso de seguridad: Acceso controlado a carpetas de Windows"
body = "OFFTYPE integra [llama.cpp](https://github.com/ggerganov/llama.cpp) (licencia de código abierto MIT) para traducción y pulido de texto en el dispositivo. El ejecutable de Windows para este proyecto de código abierto se llama `llama-cli.exe`. Debido a que carece de un certificado de firma de código comercial ($200–400/año), Windows Security puede marcarlo como una aplicación no reconocida."
blocked = "Si ves \"El acceso controlado a carpetas bloqueó llama-cli.exe\":"
step1 = "Abre Seguridad de Windows → Protección contra virus y amenazas"
step2 = 'En "Acceso controlado a carpetas", haz clic en "Administrar el acceso controlado a carpetas"'
step3 = 'Haz clic en "Permitir una aplicación a través del acceso controlado a carpetas" → Agregar una aplicación permitida'
step4 = "Navega a `C:\\Program Files\\OFFTYPE\\speech-server\\_internal\\llama-cpp\\llama-cli.exe`"
step5 = "Confirmar"
skip = "¿Qué ocurre si omito esto?"
skip_body = "La traducción y el pulido no funcionarán. La entrada de voz (ASR) no se ve afectada. Es tu elección."
why = "¿Por qué no se hace esto automáticamente?"
why_body = "Modificar la configuración de seguridad del sistema es un cambio significativo en tu ordenador. OFFTYPE no tomará esa decisión por ti."

