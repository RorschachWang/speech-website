body = "Modelo de reconocimiento de voz. Los modelos descargados aparecen en la lista; los que faltan muestran \"(descarga requerida).\"\n- **SenseVoice**: Predeterminado. 5 idiomas (chino, inglés, japonés, coreano, cantonés). Rápido.\n- **Qwen3-ASR**: 30 idiomas + 22 dialectos chinos (sichuanés, vietnamita, árabe, hindi, etc.). Más lento que SenseVoice."

[docs.preferences.ollama]
