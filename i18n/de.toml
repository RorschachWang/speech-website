# 7. PRIVACY page (marketing/explainer)
[privacy]
[privacy.hero]
eyebrow = "Datenschutz by Design"
title = "Keine Netzwerkanfragen.\nDeine Stimme verlaesst nie deinen Rechner."
subtitle = "Kein Slogan. Eine ueberpruefbare Tatsache — aufgezeichnet in Wireshark."

[privacy.proof]
eyebrow = "Beweis, live aufgezeichnet"
title = "1.683 Pakete · 0 externe Verbindungen"
body = "Wir haben Wireshark waehrend der Nutzung von OFFTYPE fuer Spracheingabe laufen lassen. Der Filter `ip.addr != 127.0.0.1 && ip.addr != ::1` zeigt den gesamten externen Netzwerkverkehr. Das Ergebnis spricht fuer sich."
caption = "Filter: `ip.addr != 127.0.0.1 && ip.addr != ::1` · 1.683 Pakete aufgezeichnet · 0 externe Verbindungen waehrend der Spracherkennung"

[privacy.architecture]
title = "Wie deine Daten fliessen"
subtitle = "Vier Phasen. Alles passiert im Prozess auf deinem Geraet."

[privacy.architecture.stage1]
title = "Mikrofon nimmt Audio auf"
body = "Audio wird vom Systemmikrofon aufgenommen und direkt an den lokalen Sprachserver gesendet. Es passiert nie eine Netzwerkschnittstelle."

[privacy.architecture.stage2]
title = "Lokales ASR-Modell wandelt Sprache in Text um"
body = "Das ASR-Modell (SenseVoice-Small oder Qwen3-ASR) laeuft vollstaendig im Prozess. Die Audio verlaesst nie den RAM."

[privacy.architecture.stage3]
title = "Lokale KI ergaenzt Zeichensetzung und korrigiert"
body = "Optional fuegt ein lokales 1,5-Milliarden-Parameter-Modell Zeichensetzung hinzu, uebersetzt oder schreibt den Text um — alles lokal verarbeitet."

[privacy.architecture.stage4]
title = "Text wird an deinem Cursor eingefuegt"
body = "Der finale Text wird direkt ueber die Zwischenablage in die Zielanwendung eingefuegt. Er wird nirgendwohin gesendet."

[privacy.cta]
title = "Datenschutz ist keine Einstellung.\nEr ist die Architektur."
body = "Es gibt kein Opt-in. Es gibt kein Tracking. Es gibt keine Cloud."

