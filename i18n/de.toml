# 10. PRIVACY POLICY page (legal)
[privacy_policy]
[privacy_policy.hero]
eyebrow = "Rechtliches · Datenschutzerklaerung"
title = "Datenschutzerklaerung"
subtitle = "Wir sammeln nichts. Diese Richtlinie erklaert im Detail, was das bedeutet."
meta = "Gueltig ab: 03.05.2026 · Zuletzt aktualisiert: 03.05.2026"

[privacy_policy.section1]
title = "Was OFFTYPE nicht tut"
intro = "OFFTYPE sammelt, uebertraegt oder speichert **nicht**:"
item1 = "Sprachaufnahmen oder Mikrofoneingaben"
item2 = "Transkribierten Text oder Tastatureingaben"
item3 = "Dokumente oder Fenster, die du mit der App nutzt"
item4 = "Namen, E-Mails oder Kontoinformationen (es gibt keine Konten)"
item5 = "IP-Adressen, Geraetekennungen oder Systemmetadaten"
item6 = "Absturzberichte, Telemetrie oder Nutzungsanalysen"
item7 = "Es gibt kein Konto. Es gibt keinen Analysedienst."

[privacy_policy.section2]
title = "Netzwerkaktivitaet"
intro = "OFFTYPE verbindet sich nur in zwei Situationen mit dem Internet:"
p1 = "**1. Modell-Downloads** — Wenn du ein KI-Modell installierst oder aktualisierst, werden Dateien von [Hugging Face](https://huggingface.co/privacy) oder [ModelScope](https://www.modelscope.cn/privacy) heruntergeladen. Diese Dienste koennen standardmaessige HTTP-Metadaten (IP, User-Agent) gemaess ihren eigenen Richtlinien protokollieren. Wir erhalten diese Daten nicht. Du kannst optionale Modelle ueberspringen; nur das Standard-ASR-Modell wird beim ersten Start automatisch heruntergeladen."
p2 = "**2. Update-Pruefungen** — Die App kann [GitHub Releases](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement) auf neue Versionen pruefen. Dies sendet eine minimale Anfrage direkt an GitHub; wir erhalten oder protokollieren sie nicht. Du kannst dies in den Einstellungen deaktivieren."
p3 = "Spracherkennung, Zeichensetzung, Uebersetzung und Texteinfuegung passieren vollstaendig auf deinem Geraet ohne Netzwerkanfragen."

[privacy_policy.section3]
title = "Lokale Datenspeicherung"
intro = "OFFTYPE speichert Folgendes nur auf deinem Geraet:"
item1 = "**Konfiguration:** `%APPDATA%/OFFTYPE/config.yaml` — dein Hotkey, Modellauswahl und Einstellungen."
item2 = "**Modelldateien:** `%APPDATA%/OFFTYPE/models/` — heruntergeladene KI-Modelle."
item3 = "**Protokolle:** `%APPDATA%/OFFTYPE/logs/` — lokale Diagnoseprotokolle (nur auf diesem Rechner, nie uebertragen)."
outro = "Du kannst all dies jederzeit loeschen. Die Deinstallation von OFFTYPE ueber Programme hinzufuegen oder entfernen entfernt die Anwendung; der Datenordner muss gegebenenfalls manuell geloescht werden, wenn du ihn vollstaendig entfernen moechtest."

[privacy_policy.section4]
title = "Cookies und Tracking"
body = "OFFTYPE ist eine Desktop-App, keine Website. Sie verwendet keine Cookies oder Tracker."

[privacy_policy.section5]
title = "Drittanbieter-Komponenten"
p1 = "OFFTYPE verwendet Open-Source-KI-Modelle und Bibliotheken. Keine von ihnen uebertraegt Daten von deinem Geraet. Siehe die [Hinweis](/notice/)-Seite fuer die vollstaendige Liste."
p2 = "Wenn du Netzwerkfunktionen nutzt, interagierst du direkt mit [Hugging Face](https://huggingface.co/privacy), [ModelScope](https://www.modelscope.cn/privacy) und [GitHub](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement)."

[privacy_policy.section6]
title = "Deine Rechte"
body = "Da wir keine personenbezogenen Daten sammeln, gibt es im Allgemeinen keine Daten, auf die zugegriffen, die korrigiert oder geloescht werden muessten. Wenn du in der EU bist, hast du Rechte gemaess der DSGVO bezueglich aller personenbezogenen Daten, die Drittanbieterdienste (Hugging Face, ModelScope, GitHub) verarbeiten koennen, wenn du Netzwerkfunktionen nutzt. Um diese Rechte auszuueben, kontaktiere diese Dienste direkt oder schreibe uns eine E-Mail und wir weisen dich in die richtige Richtung."

[privacy_policy.section7]
title = "Aenderungen dieser Richtlinie"
body = "Wenn sich diese Richtlinie aendert, aktualisieren wir das Datum oben und veroeffentlichen einen Hinweis auf der Website. Wesentliche Aenderungen erscheinen auch in den Release Notes der App."

[privacy_policy.section8]
title = "Kontakt"
body = "Fragen? E-Mail an [privacy@offtype.app](mailto:privacy@offtype.app)."

disclaimer = "*Diese Richtlinie ist in einfachem Englisch verfasst. Sie ersetzt keine Rechtsberatung.*"

