[docs.quickstart]
title = "Schnellstart"

[docs.quickstart.step1]
title = "Lade den Installer herunter."
body = "Gehe zur [Download-Seite](/download/) und lade den Windows-Installer herunter (~200 MB)."

[docs.quickstart.step2]
title = "Fuehre den Installer aus."
body = "Doppelklicke die `.exe`. Wenn Windows SmartScreen warnt, klicke auf \"Weitere Informationen\" → \"Trotzdem ausfuehren\". OFFTYPE wird unter `C:\\Program Files\\OFFTYPE\\` installiert."

[docs.quickstart.step3]
title = "Beim ersten Start wird das Standardmodell heruntergeladen."
body = "OFFTYPE laedt SenseVoice-Small (~230 MB) beim ersten Start herunter. Dies ist das einzige erforderliche Modell."

[docs.quickstart.step4]
title = "Druecke Strg + Leertaste und sprich."
body = "Halte den Hotkey gedrueckt, sprich natuerlich, lass los. Dein Text erscheint am Cursor."

[docs.hotkey]
title = "Hotkey nutzen"
default = "Standard-Hotkey: `Strg` + `Leertaste`"
hold = "**Halten zum Sprechen:** Hotkey gedrueckt halten, sprechen, dann loslassen. Der erkannte Text wird an deinem Cursor eingefuegt."
toggle = "**Tippen zum Umschalten:** In den Einstellungen kannst du auf den Umschaltmodus wechseln — einmal tippen zum Starten, nochmal zum Stoppen."
change = "**Hotkey aendern:** Tray-Symbol rechtsklicken → Einstellungen → Hotkey. Jede Kombination wird unterstuetzt."

