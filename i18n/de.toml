[docs.troubleshooting]
title = "Fehlerbehebung"

[docs.troubleshooting.hotkey]
title = "Der Hotkey tut nichts"
item1 = "Pruefe, ob das Tray-Symbol gruen (aktiv) ist. Rechtsklick → Server neu starten, falls es rot ist."
item2 = "Eine andere Anwendung koennte `Strg`+`Leertaste` abfangen. Aendere den Hotkey in den Einstellungen."

[docs.troubleshooting.mic]
title = "Keine Mikrofoneingabe erkannt"
item1 = "Oeffne Windows-Einstellungen → Datenschutz → Mikrofon und erlaube Desktop-Apps den Zugriff auf das Mikrofon."
item2 = "Tray-Symbol rechtsklicken → Einstellungen → Audiogeraet und waehle das richtige Mikrofon aus."

[docs.troubleshooting.slow]
title = "Erkennung ist langsam"
item1 = "Der erste Durchlauf nach dem Start ist langsamer, waehrend das Modell in den RAM geladen wird. Nachfolgende Erkennungen sind sofort."
item2 = "Wechsle zu SenseVoice-Small (schneller), wenn du keine Dialektunterstuetzung benoetigst."
item3 = "Deaktiviere Uebersetzung, wenn du nur Transkription benoetigst."

[docs.troubleshooting.download]
title = "Modell-Download schlaegt fehl"
item1 = "Pruefe deine Internetverbindung. Modell-Downloads benoetigen eine einmalige Verbindung zu Hugging Face oder ModelScope."
item2 = "Wenn Hugging Face langsam ist, wechsle in Einstellungen → Modelle → Mirror auf ModelScope."

[docs.troubleshooting.t1]
title = "Uebersetzung / Optimierung funktioniert nicht?"
item1 = "Ist Ollama in den Einstellungen aktiviert, aber Ollama laeuft nicht? (OFFTYPE wartet auf die Verbindung und bricht ab)"
item2 = "Ist das lokale LLM heruntergeladen?"
item3 = "Blockiert Windows Controlled Folder Access `llama-cli.exe`? (Siehe Abschnitt Installation oben)"

[docs.troubleshooting.t2]
title = "Download ist langsam?"
item1 = "SenseVoice laedt von HuggingFace / ModelScope herunter. In den meisten Regionen wird ModelScope automatisch ausgewaehlt."
item2 = "Qwen3-ASR laedt von GitHub Releases herunter. OFFTYPE prueft verfuegbare Mirrors und nutzt den schnellsten."

[docs.troubleshooting.t3]
title = "Nichts passiert nach dem Start?"
item1 = "Warte 5 Sekunden — der Server braucht Zeit zum Starten"
item2 = "Oeffne den Task-Manager, um zu pruefen, ob `speech-server.exe` laeuft"
item3 = "Wenn eine vorherige Version installiert war, beende alte Prozesse zuerst: `taskkill /F /IM speech-server.exe`"

[docs.troubleshooting.t4]
title = "Wie deinstalliere ich?"
item1 = "Startmenue → Einstellungen → Apps → Installierte Apps → OFFTYPE suchen → Deinstallieren."
item2 = "Modelldateien werden unter `%APPDATA%\\OFFTYPE\\models\\` gespeichert. Diesen Ordner musst du nach der Deinstallation manuell loeschen."

[docs.faq]
title = "FAQ"
q1 = "Sendet OFFTYPE meine Stimme irgendwohin?"
a1 = "Nein. Spracherkennung, Zeichensetzung und Uebersetzung passieren alle auf deinem Rechner. Siehe [Datenschutz](/privacy/) fuer den Wireshark-Beweis."
q2 = "Funktioniert OFFTYPE offline?"
a2 = "Ja, nach dem ersten Modell-Download. Die anschliessende Nutzung ist vollstaendig offline."
q3 = "Kann ich es unter macOS oder Linux nutzen?"
a3 = "Derzeit nicht. OFFTYPE ist nur fuer Windows verfuegbar. macOS und Linux sind nicht auf der unmittelbaren Roadmap."
q4 = "Gibt es eine kostenpflichtige Version?"
a4 = "OFFTYPE ist derzeit kostenlos. Es gibt kein Abo, kein Konto, keine Zahlung."
q5 = "Kann ich es in einem Firmennetzwerk nutzen?"
a5 = "Ja. OFFTYPE benoetigt nur Netzwerkzugriff fuer den ersten Modell-Download und optionale Update-Pruefungen. Danach funktioniert es vollstaendig offline. Wenn deine Firewall Hugging Face blockiert, konfiguriere den ModelScope-Mirror."
q6 = "Wie deinstalliere ich?"
a6 = "Windows-Einstellungen → Apps → OFFTYPE → Deinstallieren. Um alle Daten zu entfernen, loesche `%APPDATA%\\OFFTYPE\\` manuell."

