[docs.install.security]
title = "Sicherheitshinweis: Windows Controlled Folder Access"
body = "OFFTYPE bindet [llama.cpp](https://github.com/ggerganov/llama.cpp) (MIT Open-Source-Lizenz) fuer Uebersetzung und Textoptimierung auf dem Geraet ein. Die Windows-Executable fuer dieses Open-Source-Projekt heisst `llama-cli.exe`. Da sie kein kommerzielles Code-Signing-Zertifikat besitzt (200–400 $/Jahr), kann Windows-Sicherheit sie als nicht erkannte Anwendung markieren."
blocked = "Wenn du \"Controlled folder access blocked llama-cli.exe\" siehst:"
step1 = "Oeffne Windows-Sicherheit → Viren- & Bedrohungsschutz"
step2 = "Unter \"Zugriff auf Ordner kontrollieren\" klicke auf \"Zugriff auf Ordner kontrollieren verwalten\""
step3 = "Klicke auf \"Eine App ueber den kontrollierten Ordnerzugriff zulassen\" → Zulaessige App hinzufuegen"
step4 = "Navigiere zu `C:\\Program Files\\OFFTYPE\\speech-server\\_internal\\llama-cpp\\llama-cli.exe`"
step5 = "Bestaetigen"
skip = "Was passiert, wenn ich dies ueberspringe?"
skip_body = "Uebersetzung und Optimierung funktionieren nicht. Spracheingabe (ASR) ist nicht betroffen. Es ist deine Entscheidung."
why = "Warum wird das nicht automatisch erledigt?"
why_body = "Das Aendern von Systemsicherheitseinstellungen ist eine erhebliche Aenderung an deinem Computer. OFFTYPE trifft diese Entscheidung nicht fuer dich."

