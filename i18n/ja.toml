[docs.troubleshooting]
title = "トラブルシューティング"

[docs.troubleshooting.hotkey]
title = "ホットキーが反応しない"
item1 = "トレイアイコンが緑色（アクティブ）か確認してください。赤色の場合は、右クリック → サーバーを再起動 してください。"
item2 = "別のアプリケーションが `Ctrl`+`Space` をキャプチャしている可能性があります。設定でホットキーを変更してください。"

[docs.troubleshooting.mic]
title = "マイク入力が検出されない"
item1 = "Windows 設定 → プライバシー → マイク を開き、デスクトップアプリがマイクにアクセスできるようにします。"
item2 = "トレイアイコンを右クリック → 設定 → オーディオデバイス で、正しいマイクを選択します。"

[docs.troubleshooting.slow]
title = "認識が遅い"
item1 = "起動後の初回認識は、モデルがRAMに読み込まれるため遅くなります。その後の認識は即座に行われます。"
item2 = "方言サポートが不要な場合は、SenseVoice-Small（高速）に切り替えてください。"
item3 = "文字起こしのみが必要な場合は、翻訳を無効にしてください。"

[docs.troubleshooting.download]
title = "モデルのダウンロードに失敗する"
item1 = "インターネット接続を確認してください。モデルのダウンロードには、Hugging FaceまたはModelScopeへの一度だけの接続が必要です。"
item2 = "Hugging Faceが遅い場合は、設定 → モデル → ミラー でModelScopeミラーを選択してください。"

[docs.troubleshooting.t1]
title = "翻訳 / 磨き上げが機能しない？"
item1 = "設定でOllamaが有効になっているのにOllamaが実行されていませんか？（OFFTYPEは接続を待ってタイムアウトします）"
item2 = "ローカルLLMはダウンロードされていますか？"
item3 = "Windows 制御されたフォルダー アクセスが `llama-cli.exe` をブロックしていませんか？（上記のインストールセクションを参照）"

[docs.troubleshooting.t2]
title = "ダウンロードが遅い？"
item1 = "SenseVoiceはHuggingFace / ModelScopeからダウンロードされます。ほとんどの地域で、ModelScopeは自動的に選択されます。"
item2 = "Qwen3-ASRはGitHub Releasesからダウンロードされます。OFFTYPEは利用可能なミラーを確認し、最も速いものを使用します。"

[docs.troubleshooting.t3]
title = "起動後に何も起こらない？"
item1 = "5秒待ってください — サーバーの起動に時間がかかります"
item2 = "タスクマネージャーを開いて `speech-server.exe` が実行中か確認してください"
item3 = "以前のバージョンがインストールされている場合は、まず古いプロセスを終了させてください：`taskkill /F /IM speech-server.exe`"

[docs.troubleshooting.t4]
title = "アンインストール方法は？"
item1 = "スタートメニュー → 設定 → アプリ → インストール済みアプリ → OFFTYPEを検索 → アンインストール。"
item2 = "モデルファイルは `%APPDATA%\\OFFTYPE\\models\\` に保存されています。アンインストール後に手動でこのフォルダーを削除する必要があります。"

[docs.faq]
title = "FAQ"
q1 = "OFFTYPEは私の音声をどこかに送信しますか？"
a1 = "いいえ。音声認識、句読点付与、翻訳はすべてあなたの端末上で行われます。[プライバシー](/privacy/)ページでWiresharkの証明をご覧ください。"
q2 = "OFFTYPEはオフラインで動作しますか？"
a2 = "はい、初回モデルダウンロード後はオフラインで完全に動作します。"
q3 = "macOSやLinuxで使用できますか？"
a3 = "現時点ではできません。OFFTYPEはWindows専用です。macOSとLinuxは当面のロードマップにはありません。"
q4 = "有料版はありますか？"
a4 = "OFFTYPEは現在無料です。サブスクリプション、アカウント、支払いはありません。"
q5 = "企業ネットワークで実行できますか？"
a5 = "はい。OFFTYPEは初回モデルダウンロードとオプションのアップデートチェックにのみネットワークアクセスが必要です。その後は完全にオフラインで動作します。ファイアウォールがHugging Faceをブロックしている場合は、ModelScopeミラーを構成してください。"
q6 = "アンインストール方法は？"
a6 = "Windows 設定 → アプリ → OFFTYPE → アンインストール。すべてのデータを削除するには、`%APPDATA%\\OFFTYPE\\` を手動で削除してください。"

