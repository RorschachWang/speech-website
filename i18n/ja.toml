# 10. PRIVACY POLICY page (legal)
[privacy_policy]
[privacy_policy.hero]
eyebrow = "法的情報 · プライバシーポリシー"
title = "プライバシーポリシー"
subtitle = "私たちは何も収集しません。このポリシーでは、それが具体的にどういう意味かを説明します。"
meta = "発効日：2026-05-03 · 最終更新日：2026-05-03"

[privacy_policy.section1]
title = "OFFTYPEが行わないこと"
intro = "OFFTYPEは**収集、送信、保存を行いません**："
item1 = "音声録音やマイク入力"
item2 = "文字起こしされたテキストやキーストローク"
item3 = "アプリで使用する文書やウィンドウ"
item4 = "名前、メールアドレス、アカウント情報（アカウントはありません）"
item5 = "IPアドレス、デバイス識別子、システムメタデータ"
item6 = "クラッシュレポート、テレメトリ、使用状況分析"
item7 = "アカウントはありません。分析サービスはありません。"

[privacy_policy.section2]
title = "ネットワークアクティビティ"
intro = "OFFTYPEがインターネットに接続するのは、次の2つの状況のみです："
p1 = "**1. モデルのダウンロード** — AIモデルをインストールまたは更新する際、ファイルは[Hugging Face](https://huggingface.co/privacy)または[ModelScope](https://www.modelscope.cn/privacy)からダウンロードされます。これらのサービスは、各自のポリシーに従って標準的なHTTPメタデータ（IP、ユーザーエージェント）を記録する場合があります。私たちはこのデータを受け取りません。オプションのモデルはスキップできます。デフォルトのASRモデルのみが初回実行時に自動的にダウンロードされます。"
p2 = "**2. アップデートチェック** — アプリは新しいバージョンを確認するために[GitHub Releases](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement)を確認する場合があります。これはGitHubに対する最小限のリクエストを直接送信します。私たちはこれを受信も記録もしません。設定で無効にできます。"
p3 = "音声認識、句読点付与、翻訳、テキスト挿入は、すべてあなたの端末上でネットワークリクエストなしに実行されます。"

[privacy_policy.section3]
title = "ローカルデータの保存"
intro = "OFFTYPEは以下のデータのみをあなたの端末に保存します："
item1 = "**設定：** `%APPDATA%/OFFTYPE/config.yaml` — ホットキー、モデル選択、設定。"
item2 = "**モデルファイル：** `%APPDATA%/OFFTYPE/models/` — ダウンロードされたAIモデル。"
item3 = "**ログ：** `%APPDATA%/OFFTYPE/logs/` — ローカル診断ログ（この端末上のみで、送信されません）。"
outro = "これらはいつでも削除できます。プログラムの追加と削除からOFFTYPEをアンインストールするとアプリケーションは削除されます。データフォルダーを完全に削除したい場合は、手動で削除する必要がある場合があります。"

[privacy_policy.section4]
title = "Cookieと追跡"
body = "OFFTYPEはデスクトップアプリであり、ウェブサイトではありません。Cookieやトラッカーは使用しません。"

[privacy_policy.section5]
title = "サードパーティコンポーネント"
p1 = "OFFTYPEはオープンソースのAIモデルとライブラリを使用しています。いずれもあなたの端末からデータを送信しません。詳細なリストは[Notice](/notice/)ページをご覧ください。"
p2 = "ネットワーク機能を使用する際は、[Hugging Face](https://huggingface.co/privacy)、[ModelScope](https://www.modelscope.cn/privacy)、[GitHub](https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement)と直接やり取りします。"

[privacy_policy.section6]
title = "あなたの権利"
body = "私たちは個人データを収集しないため、一般にアクセス、修正、削除すべきデータはありません。EU在住の場合、ネットワーク機能を使用する際にサードパーティサービス（Hugging Face、ModelScope、GitHub）が処理する可能性のある個人データについて、GDPRに基づく権利があります。これらの権利を行使するには、これらのサービスに直接お問い合わせいただくか、メールでご連絡いただければ適切な方向をお示しします。"

[privacy_policy.section7]
title = "このポリシーの変更"
body = "このポリシーが変更された場合、上部の日付を更新し、ウェブサイトに通知を掲載します。重要な変更は、アプリのリリースノートにも記載されます。"

[privacy_policy.section8]
title = "お問い合わせ"
body = "ご質問は [privacy@offtype.app](mailto:privacy@offtype.app) までお寄せください。"

disclaimer = "*このポリシーは平易な英語で記載されています。法的アドバイスを代替するものではありません。*"

